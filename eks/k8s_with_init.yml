---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixel-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pixel-monitor
  template:
    metadata:
      labels:
        app: pixel-monitor
    spec:
      serviceAccountName: pod-ident-sa

      initContainers:
        - name: run-migrations
          image: 792248863583.dkr.ecr.us-east-1.amazonaws.com/pixel-monitor/api:v1
          imagePullPolicy: Always
          command:
            - python
            - manage.py
            - migrate
            - --noinput
          envFrom:
            - configMapRef:
                name: db-config
            - configMapRef:
                name: s3-config
          env:
            - name: ALLOWED_HOSTS
              # value: "k8s-default-pixelmon-45cde402f9-273315686.us-east-1.elb.amazonaws.com"
              value: "*"
            - name: CORS_ALLOWED_ORIGINS
              value: "http://pixel-monitor-frontend-xyz.s3-website-us-east-1.amazonaws.com"
            - name: DB_PORT
              value: "5432"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: DB_PASS
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-secret-key
                  key: DJANGO_SECRET_KEY

      containers:
        - name: pixel-backend
          image: 792248863583.dkr.ecr.us-east-1.amazonaws.com/pixel-monitor/api:v1
          imagePullPolicy: Always # IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: db-config
            - configMapRef:
                name: s3-config
          env:
            - name: ALLOWED_HOSTS
              value: "*"
            - name: CORS_ALLOWED_ORIGINS
              # value: "http://pixel-monitor-frontend-xyz.s3-website-us-east-1.amazonaws.com"
              value: "https://d2cdblnh2zsou2.cloudfront.net"
            - name: DB_PORT
              value: "5432"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: DB_PASS
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-secret-key
                  key: DJANGO_SECRET_KEY
          # startupProbe:
          #   httpGet:
          #     path: /healthz/
          #     port: 8000
          #   failureThreshold: 30
          #   periodSeconds: 5
          # readinessProbe:
          #   httpGet:
          #     path: /healthz/
          #     port: 8000
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
          #   failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz/
              port: 8000
              httpHeaders:
                - name: Host
                  value: k8s-default-pixelmon-45cde402f9-273315686.us-east-1.elb.amazonaws.com
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: pixel-monitor-service
spec:
  selector:
    app: pixel-monitor
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
