apiVersion: apps/v1
kind: Deployment
metadata:
  name: unready-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unready-app
  template:
    metadata:
      labels:
        app: unready-app
    spec:
      containers:
        - name: app
          image: python:3.11-slim
          command:
            - python
            - -c
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/healthz":
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(b"NOT READY")
                      else:
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"hello")

              HTTPServer(("", 8080), Handler).serve_forever()

          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
