name: deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 865274826587
  CLUSTER_NAME: pixel-monitor
  ECR_REPOSITORY: pixel-monitor
  ROLE_NAME: github-actions-eks-deployer

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Set IMAGE_URI
        run: |
          echo "IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build -t $IMAGE_URI:${GITHUB_SHA} ./backend

      - name: Push image
        run: |
          docker push $IMAGE_URI:${GITHUB_SHA}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install pixel-monitor ./eks/pixel-monitor \
            --set image.repository=$IMAGE_URI \
            --set image.tag=${GITHUB_SHA}

          kubectl rollout status deployment/pixel-monitor
