name: deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 802838070254
  CLUSTER_NAME: pixel-monitor
  ECR_REPOSITORY: pixel-monitor
  CONTAINER_NAME: pixel-backend
  ROLE_NAME: github-actions-eks-deployer

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug OIDC token
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=$ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=$ACTIONS_ID_TOKEN_REQUEST_TOKEN"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: |
          docker build -t $ECR_REPOSITORY:${GITHUB_SHA} ./backend
      
      - name: Set IMAGE_URI
        run: |
          echo "IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}" >> $GITHUB_ENV

      - run: |
          docker tag $ECR_REPOSITORY:${GITHUB_SHA} $IMAGE_URI:${GITHUB_SHA}

      - run: |
          docker push $IMAGE_URI:${GITHUB_SHA}

      - run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - run: |
          kubectl set image deployment/pixel-monitor \
            $CONTAINER_NAME=$IMAGE_URI:${GITHUB_SHA}

          kubectl rollout status deployment/pixel-monitor
