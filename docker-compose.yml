services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    env_file:
      - ./backend/.env

    environment:
      DB_HOST: db
      DB_USER: ${PG_USER}
      DB_PASS: ${PG_PASS}
      DB_NAME: ${PG_DB}
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DEBUG: 1

    expose:
      - "8000"

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      "
    volumes:
      - staticfiles:/code/staticfiles
      - media-data:/code/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17.9
    restart: always

    env_file:
      - ./backend/.env

    volumes:
      - pg-data:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DB}

    expose:
      - "5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - staticfiles:/usr/share/nginx/static:ro
      - media-data:/usr/share/nginx/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - api

volumes:
  pg-data:
  staticfiles:
  media-data:
